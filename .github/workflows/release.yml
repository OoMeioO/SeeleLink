name: Release Build & Test

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Unit Tests (parallel with builds)
  # ─────────────────────────────────────────────────────────────
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

  # ─────────────────────────────────────────────────────────────
  # Linux Build
  # ─────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Package Linux
        run: npm run package -- --linux --dir
        env:
          npm_config_build_from_source: true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeeleLink-linux
          path: release/linux-unpacked/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # macOS Build — use macos-latest (Intel fallback)
  # Note: Apple Silicon runners available as macos-14
  # ─────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Package macOS
        run: npm run package -- --mac --dir
        env:
          npm_config_build_from_source: true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeeleLink-macos
          path: release/mac/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Windows Build
  # ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Package Windows
        run: npm run package -- --win --dir

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeeleLink-windows
          path: release/win-unpacked/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Integration Tests (run against Linux build)
  # ─────────────────────────────────────────────────────────────
  test-integration:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install xvfb and curl
        run: sudo apt-get update && sudo apt-get install -y xvfb curl

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SeeleLink-linux
          path: ./linux-unpacked

      - name: List unpacked contents
        run: ls -la ./linux-unpacked/ | head -20

      - name: Build Vite (for test helpers)
        run: npm run build

      - name: Make executable
        run: chmod +x ./linux-unpacked/seelelink

      - name: Start Electron app (headless via xvfb, --no-sandbox for CI)
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            ./linux-unpacked/seelelink \
            --disable-gpu --no-sandbox --disable-software-rasterizer &
          echo $! > /tmp/electron.pid
          echo "Electron PID: $(cat /tmp/electron.pid)"

      - name: Wait for services (TCP check for 9380, HTTP check for 9381)
        run: node tests/integration/wait-for-services.cjs

      - name: Run integration tests
        run: node tests/integration/feature-coverage.test.cjs
        timeout-minutes: 10

      - name: Stop Electron app
        if: always()
        run: |
          if [ -f /tmp/electron.pid ]; then
            kill -9 $(cat /tmp/electron.pid) 2>/dev/null || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
